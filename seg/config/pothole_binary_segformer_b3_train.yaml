seed: 42
device: cuda
num_workers: 0
save_dir: seg/runs/segformer_b3_hf_pothole

data:
 # Recommended local layout:
 # datasets/pothole_binary/processed/train/images
 # datasets/pothole_binary/processed/train/masks
 # datasets/pothole_binary/processed/val/images
 # datasets/pothole_binary/processed/val/masks
 root: datasets/pothole_binary/processed
 class_names:
  - background
  - pothole
 ignore_index: 255
 # Common binary pothole masks use 0 for background and 255/white for damage.
 # This converts any value > 0 to class 1.
 mask_positive_threshold: 0
 # Usually keep this empty. If your dataset has real ignore pixels, add values here.
 mask_ignore_values: []
 # Allows small filename mistakes between images and masks. Reports are saved to seg/runs/dataset_pairing_reports.
 allow_fuzzy_filename_match: true
 fuzzy_match_threshold: 0.82

model:
 name: segformer_b3
 num_classes: 2
 use_aux: false
 variant: b3
 pretrained: true
 hf_model_name: seg/transformer_b3/hf_pretrained/segformer_b3_ade

train:
 # B3 is heavy. Use 192x320 + batch 1/2 on weak GPU. Increase only if memory allows.
 image_size: [192, 320]
 batch_size: 2
 epochs: 20
 amp: true
 base_lr: 0.00006
 weight_decay: 0.01
 grad_clip: 1.0
 print_freq: 1
 early_stopping_patience: 6
 class_weights: [0.35, 0.65]
 loss:
  ce_weight: 1.0
  dice_weight: 0.6

val:
 batch_size: 1

optimizer:
 name: adamw

scheduler:
 name: poly
 power: 0.9
 min_lr: 0.000001

infer:
 overlay_alpha: 0.45
 palette:
  - [30, 30, 30]
  - [255, 90, 0]
